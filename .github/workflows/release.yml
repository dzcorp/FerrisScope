name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp (without leading v). Leave blank to use 0.0.0-dev."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  RUST_TOOLCHAIN: "1.94"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            package_id: linux-x64
          - name: macOS x64
            os: macos-15-intel
            package_id: macos-x64
          - name: macOS arm64
            os: macos-15
            package_id: macos-arm64
          - name: Windows x64
            os: windows-2022
            package_id: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Derive version from git tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="0.0.0-dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          # Bake the toolchain version into the cache key so we don't get
          # stale `target/` blobs on a Rust bump. Release builds always
          # write/refresh — the cache is only useful when it lands.
          prefix-key: v2-release-rust${{ env.RUST_TOOLCHAIN }}-${{ matrix.os }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            build-essential \
            file \
            fakeroot \
            rpm

      - name: Stamp version (workspace + tauri.conf.json + ui)
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Workspace Cargo.toml
          sed -i.bak -E 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          rm -f Cargo.toml.bak
          # Tauri config
          python3 - <<'PY'
          import json, os
          p = "crates/app/tauri.conf.json"
          with open(p) as f:
              data = json.load(f)
          data["version"] = os.environ["VERSION"]
          with open(p, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY
          # ui/package.json (cosmetic)
          python3 - <<'PY'
          import json, os
          p = "ui/package.json"
          with open(p) as f:
              data = json.load(f)
          data["version"] = os.environ["VERSION"]
          with open(p, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          PY
          cargo generate-lockfile
          echo "--- stamped versions ---"
          grep '^version' Cargo.toml
          grep -E '"version"' crates/app/tauri.conf.json ui/package.json

      - name: Install npm deps
        working-directory: ui
        run: npm ci

      # Build the frontend explicitly here rather than relying on Tauri's
      # `beforeBuildCommand`. Tauri 2 resolves that command's cwd in a way
      # that depends on how `tauri build` is invoked, and we hit cross-
      # platform path-resolution mismatches (Windows + macOS were trying
      # to read `<workspace>/../ui/package.json`). Doing the npm build
      # ourselves removes the ambiguity entirely.
      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Build bundles via Tauri CLI
        run: ui/node_modules/.bin/tauri build

      - name: Stage Linux bundles
        if: runner.os == 'Linux'
        shell: bash
        env:
          PKG: ${{ matrix.package_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Tauri 2 places bundles under target/release/bundle/<format>
          shopt -s nullglob
          for f in target/release/bundle/appimage/*.AppImage \
                   target/release/bundle/deb/*.deb \
                   target/release/bundle/rpm/*.rpm; do
            base="$(basename "$f")"
            ext="${base##*.}"
            stem="${base%.*}"
            # Inject the package_id if not already present
            if [[ "$stem" != *"$PKG"* ]]; then
              new="${stem}-${PKG}.${ext}"
            else
              new="${base}"
            fi
            cp -v "$f" "dist/${new}"
          done
          ls -la dist/

      - name: Verify Linux .deb installs the lowercase binary
        # Catch the AUR-empty-package bug at build time, not at publish
        # time. The .deb's data tarball MUST drop the binary at
        # /usr/bin/ferrisscope so PKGBUILD's `provides=('ferrisscope')`
        # is honest and `pacman -S ferrisscope-bin` actually leaves a
        # `ferrisscope` command on PATH.
        #
        # Uses ar + tar (both in coreutils / binutils on every Ubuntu
        # runner) instead of bsdtar (which isn't preinstalled on
        # ubuntu-24.04). GNU tar 1.35 auto-detects gz/xz/zst compression
        # so we don't need to pin the data.tar extension.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb=$(ls dist/*-linux-x64.deb | head -n 1)
          [[ -n "$deb" ]] || { echo "::error::no linux-x64 .deb in dist/"; exit 1; }
          tmp=$(mktemp -d)
          (cd "$tmp" && ar x "$GITHUB_WORKSPACE/$deb")
          data_tar=$(ls "$tmp"/data.tar.* | head -n 1)
          [[ -n "$data_tar" ]] || { echo "::error::deb has no data.tar.* member"; exit 1; }
          tar -tf "$data_tar" | sort > "$GITHUB_WORKSPACE/deb-contents.txt"
          echo "=== deb contents (first 40 entries) ==="
          head -n 40 deb-contents.txt
          # Different tar implementations write entries with or without a
          # leading "./" — accept both. cargo-deb (what Tauri uses) emits
          # plain "usr/bin/ferrisscope", but downstream tooling sometimes
          # rewrites with "./" prefixes, so be tolerant.
          if ! grep -qE '^(\./)?usr/bin/ferrisscope$' deb-contents.txt; then
            echo "::error::deb is missing usr/bin/ferrisscope"
            echo "Likely cause: tauri.conf.json mainBinaryName is unset or"
            echo "doesn't match the lowercase 'ferrisscope' that PKGBUILD expects."
            exit 1
          fi
          echo "OK: usr/bin/ferrisscope present in $deb"

      - name: Stage macOS bundles
        if: runner.os == 'macOS'
        shell: bash
        env:
          PKG: ${{ matrix.package_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          for f in target/release/bundle/dmg/*.dmg; do
            base="$(basename "$f")"
            stem="${base%.*}"
            ext="${base##*.}"
            if [[ "$stem" != *"$PKG"* ]]; then
              new="${stem}-${PKG}.${ext}"
            else
              new="${base}"
            fi
            cp -v "$f" "dist/${new}"
          done
          ls -la dist/

      - name: Stage Windows bundles
        if: runner.os == 'Windows'
        shell: bash
        env:
          PKG: ${{ matrix.package_id }}
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          for f in target/release/bundle/msi/*.msi \
                   target/release/bundle/nsis/*.exe; do
            base="$(basename "$f")"
            ext="${base##*.}"
            stem="${base%.*}"
            if [[ "$stem" != *"$PKG"* ]]; then
              new="${stem}-${PKG}.${ext}"
            else
              new="${base}"
            fi
            cp -v "$f" "dist/${new}"
          done
          ls -la dist/

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package_id }}
          path: dist/*-${{ matrix.package_id }}.*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: List downloaded artifacts
        run: ls -laR release-artifacts

      - name: Recreate existing release for this tag
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Deleting existing release ${release.id} for tag ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}`);
                return;
              }
              throw error;
            }

      - name: Publish assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true

  aur-publish:
    name: Publish AUR (ferrisscope-bin)
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-24.04

    steps:
      - name: Download linux-x64 bundles
        uses: actions/download-artifact@v8
        with:
          name: linux-x64
          path: aur-assets

      - name: Generate PKGBUILD
        shell: bash
        run: |
          set -euo pipefail
          PKGVER="${GITHUB_REF_NAME#v}"

          # Locate the .deb produced by the build job. The staging step
          # gives us exactly one file matching *-linux-x64.deb.
          DEB_PATH=$(ls aur-assets/*-linux-x64.deb | head -n 1)
          if [[ -z "$DEB_PATH" ]]; then
            echo "::error::No .deb artifact found in aur-assets/"
            ls -la aur-assets/
            exit 1
          fi
          DEB_NAME="$(basename "$DEB_PATH")"
          DEB_SHA="$(sha256sum "$DEB_PATH" | cut -d' ' -f1)"

          echo "Version:    $PKGVER"
          echo "Asset:      $DEB_NAME"
          echo "SHA256:     $DEB_SHA"

          cat > PKGBUILD <<EOF
          # Maintainer: Yury Zhelezko <yzhelezko@users.noreply.github.com>
          pkgname=ferrisscope-bin
          pkgver=${PKGVER}
          pkgrel=1
          pkgdesc="Rust-native, open-source desktop IDE for Kubernetes"
          arch=('x86_64')
          url="https://github.com/yzhelezko/FerrisScope"
          license=('Apache-2.0')
          depends=('webkit2gtk-4.1' 'gtk3' 'libsoup3')
          optdepends=('kubectl: required for embedded terminal exec/kubectl tabs')
          provides=('ferrisscope')
          conflicts=('ferrisscope' 'ferrisscope-git')
          source=("\${pkgname}-\${pkgver}.deb::https://github.com/yzhelezko/FerrisScope/releases/download/v\${pkgver}/${DEB_NAME}")
          sha256sums=('${DEB_SHA}')

          package() {
              # Tauri's .deb is a standard ar archive containing
              # debian-binary, control.tar.*, data.tar.*. bsdtar handles
              # ar natively so we don't need dpkg.
              cd "\${srcdir}"
              bsdtar -xf "\${pkgname}-\${pkgver}.deb"
              bsdtar -xpf data.tar.* -C "\${pkgdir}"

              # Sanity check: bail loudly if the deb didn't ship the
              # binary at /usr/bin/ferrisscope. Tauri's bundler keys the
              # binary name off mainBinaryName in tauri.conf.json — if
              # that ever drifts back to productName ("FerrisScope"),
              # \${pkgname} would publish an empty package on AUR,
              # which is exactly the bug this guard exists to prevent.
              if [[ ! -x "\${pkgdir}/usr/bin/ferrisscope" ]]; then
                  echo "::error::deb did not install /usr/bin/ferrisscope" >&2
                  echo "Contents of \${pkgdir}/usr/bin/:" >&2
                  ls -la "\${pkgdir}/usr/bin/" 2>&1 >&2 || true
                  return 1
              fi
          }
          EOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' PKGBUILD

          echo "=== Generated PKGBUILD ==="
          cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ferrisscope-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ github.repository_owner }}
          commit_email: yzhelezko@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          force_push: true
